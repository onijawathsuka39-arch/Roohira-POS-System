<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes & Tasks | Ruhira POS</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23be185d'/><text x='50' y='50' dominant-baseline='middle' text-anchor='middle' font-family='Outfit' font-weight='bold' font-size='50' fill='white'>R</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <style>
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .note-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            position: relative;
            transition: var(--transition);
        }

        .note-card:hover {
            border-color: var(--primary);
            background: var(--card-hover);
        }

        .note-card h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .note-card p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .note-date {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 16px;
            display: block;
        }

        .note-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: var(--transition);
        }

        .note-card:hover .note-actions {
            opacity: 1;
        }
    </style>
</head>

<body class="fade-in">
    <aside class="sidebar">
        <div class="logo-section">
            <div class="logo-box"><i class="fas fa-gem text-white"></i></div>
            <span class="logo-text">RUHIRA POS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
            <a href="pos.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>POS Terminal</span></a>
            <a href="sales.html" class="nav-item"><i class="fas fa-history"></i><span>Sales History</span></a>
            <a href="orders.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>Orders</span></a>
            <a href="inventory.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventory</span></a>
            <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Customers</span></a>
            <a href="notes.html" class="nav-item active"><i class="fas fa-sticky-note"></i><span>Notes &
                    Tasks</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Reports</span></a>
            <a href="analysis.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Analysis</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>

        <div class="sidebar-footer">
            <div class="nav-item" onclick="themeManager.toggle()" style="cursor:pointer;">
                <i class="fas fa-sun theme-toggle-icon"></i>
                <span>Theme Mode</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-top">
            <div class="page-title">
                <h1>Notes & Reminders</h1>
                <p>Keep track of shop tasks, ideas, and reminders</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('noteModal')"><i class="fas fa-plus"></i> New
                Note</button>
        </header>

        <div class="notes-grid" id="notesList">
            <!-- Content -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="noteModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add New Note</h2>
                <button class="btn btn-secondary" onclick="closeModal('noteModal')">×</button>
            </div>
            <form id="noteForm">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="noteTitle" required>
                </div>
                <div class="input-group">
                    <label>Content</label>
                    <textarea id="noteContent" rows="8" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:16px;">
                    SAVE NOTE
                </button>
            </form>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await refreshNotes();
        });

        async function refreshNotes() {
            const notes = await DB.getAllNotes();
            renderNotes(notes);
        }

        function renderNotes(notes) {
            const list = document.getElementById('notesList');
            list.innerHTML = '';

            if (notes.length === 0) {
                list.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-dim);"><i class="fas fa-sticky-note" style="font-size: 40px; margin-bottom: 24px;"></i><p>No notes found. Create your first note!</p></div>';
                return;
            }

            notes.forEach(n => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.innerHTML = `
                    <div class="note-actions">
                        <button class="btn btn-secondary btn-sm" onclick="deleteNote(${n.id})"><i class="fas fa-trash text-danger"></i></button>
                    </div>
                    <h3>${n.title}</h3>
                    <p>${n.content.replace(/\n/g, '<br>')}</p>
                    <span class="note-date"><i class="fas fa-clock"></i> ${new Date(n.date).toLocaleString()}</span>
                `;
                list.appendChild(card);
            });
        }

        document.getElementById('noteForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('noteTitle').value,
                content: document.getElementById('noteContent').value
            };

            await DB.addNote(data);
            closeModal('noteModal');
            document.getElementById('noteForm').reset();
            refreshNotes();
        };

        async function deleteNote(id) {
            if (confirm('Delete this note?')) {
                await DB.deleteNote(id);
                refreshNotes();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>

</html>
