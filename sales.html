<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales History | Ruhira POS</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23be185d'/><text x='50' y='50' dominant-baseline='middle' text-anchor='middle' font-family='Outfit' font-weight='bold' font-size='50' fill='white'>R</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <style>
        .view-btn {
            padding: 6px 12px;
            font-size: 11px;
            background: var(--primary-glow);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .view-btn:hover {
            background: var(--primary);
            color: white;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .receipt-detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .receipt-items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .receipt-items-table th {
            text-align: left;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .receipt-items-table td {
            padding: 8px 0;
            font-size: 13px;
        }

        .receipt-footer {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }
    </style>
</head>

<body class="fade-in">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-section">
            <div class="logo-box"><i class="fas fa-gem text-white"></i></div>
            <span class="logo-text">RUHIRA POS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
            <a href="pos.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>POS Terminal</span></a>
            <a href="sales.html" class="nav-item active"><i class="fas fa-history"></i><span>Sales History</span></a>
            <a href="orders.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>Orders</span></a>
            <a href="inventory.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventory</span></a>
            <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Customers</span></a>
            <a href="notes.html" class="nav-item"><i class="fas fa-sticky-note"></i><span>Notes & Tasks</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Reports</span></a>
            <a href="analysis.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Analysis</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="nav-item" onclick="themeManager.toggle()" style="cursor:pointer;">
                <i class="fas fa-sun theme-toggle-icon"></i>
                <span>Theme Mode</span>
            </div>
            <div class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-top">
            <div class="page-title">
                <h1>Sales History</h1>
                <p>Manage and view all direct sales transactions</p>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="table-header">
                <div style="display:flex; gap:12px;">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="salesSearch" placeholder="Search by Customer..."
                            oninput="refreshSales()">
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>DateTime</th>
                            <th>Bill ID</th>
                            <th>Customer</th>
                            <th>Items Summary</th>
                            <th>Total Amount</th>
                            <th>Net Profit</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Sale Detail Modal -->
    <div class="modal-overlay" id="saleDetailModal">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h2>Transaction Details</h2>
                <button class="btn btn-secondary" onclick="closeModal('saleDetailModal')">×</button>
            </div>
            <div id="saleDetailsContent">
                <!-- Receipt logic injected here -->
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex:1; justify-content:center;" onclick="window.print()">
                    <i class="fas fa-print"></i> PRINT RECEIPT
                </button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await refreshSales();
        });

        async function refreshSales() {
            const allSales = await DB.getAllSales();
            const search = document.getElementById('salesSearch').value.toLowerCase();
            const tableBody = document.getElementById('salesTableBody');

            let filtered = allSales;
            if (search) {
                filtered = allSales.filter(s =>
                    (s.customer && s.customer.toLowerCase().includes(search)) ||
                    (s.customerId && s.customerId.toLowerCase().includes(search)) ||
                    (s.customerPhone && s.customerPhone.toLowerCase().includes(search)) ||
                    s.id.toString() === search.replace('#SL-', '')
                );
            }

            tableBody.innerHTML = '';
            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-dim);">No sales found</td></tr>';
                return;
            }

            filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(s => {
                const profit = s.total - (s.buyTotal || 0);
                const itemsText = s.items ? s.items.map(i => `${i.name} (x${i.qty})`).join(', ') : 'N/A';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-size:12px; color:var(--text-muted);">${new Date(s.date).toLocaleString()}</td>
                    <td style="font-weight:700;">#SL-${s.id}</td>
                    <td>
                        <div style="font-weight:600;">${s.customer || 'Guest'}</div>
                        <div style="font-size:10px; color:var(--text-dim);">${s.customerId || ''}</div>
                    </td>
                    <td style="font-size:12px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${itemsText}">
                        ${itemsText}
                    </td>
                    <td style="font-weight:700; color:var(--primary);">Rs. ${s.total.toLocaleString()}</td>
                    <td style="font-weight:700; color:var(--success);">Rs. ${profit.toLocaleString()}</td>
                    <td>
                        <button class="view-btn" onclick="viewSaleDetail(${s.id})">
                            <i class="fas fa-eye"></i> VIEW
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function viewSaleDetail(id) {
            const allSales = await DB.getAllSales();
            const sale = allSales.find(s => s.id === id);
            if (!sale) return;

            const content = document.getElementById('saleDetailsContent');
            const itemsHtml = sale.items.map(i => `
                <tr>
                    <td>${i.name} ${i.size ? `<small>(${i.size})</small>` : ''}</td>
                    <td style="text-align:center;">${i.qty}</td>
                    <td style="text-align:right;">Rs. ${(i.sellPrice * i.qty).toLocaleString()}</td>
                </tr>
            `).join('');

            const profit = sale.total - (sale.buyTotal || 0);
            const subtotal = sale.items.reduce((sum, item) => sum + (item.sellPrice * item.qty), 0);
            const discValue = (subtotal * (sale.discount || 0)) / 100;

            content.innerHTML = `
                <div class="receipt-header">
                    <h1 style="font-size:18px; color:var(--primary); margin-bottom:5px;">RUHIRA ONLINE</h1>
                    <p style="font-size:12px; color:var(--text-dim);">Order Ref: #SL-${sale.id}</p>
                    <p style="font-size:11px; color:var(--text-dim);">${new Date(sale.date).toLocaleString()}</p>
                </div>

                <div class="receipt-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; background:var(--bg-light); padding:10px; border-radius:8px;">
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">CUSTOMER</div>
                            <div style="font-weight:600; font-size:13px;">${sale.customer || 'Guest'}</div>
                        </div>
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">PHONE</div>
                            <div style="font-weight:600; font-size:13px;">${sale.customerPhone || 'N/A'}</div>
                        </div>
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">PAYMENT</div>
                            <div style="font-weight:600; text-transform:uppercase; font-size:13px;">${sale.paymentMethod || 'cash'}</div>
                        </div>
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">CUSTOMER ID</div>
                            <div style="font-weight:600; font-size:13px;">${sale.customerId || 'Guest'}</div>
                        </div>
                    </div>

                    <table class="receipt-items-table">
                        <thead>
                            <tr>
                                <th>Item Description</th>
                                <th style="text-align:center;">Qty</th>
                                <th style="text-align:right;">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>

                    <div class="receipt-footer">
                        <div class="receipt-detail-row">
                            <span style="color:var(--text-dim);">Subtotal:</span>
                            <span>Rs. ${subtotal.toLocaleString()}</span>
                        </div>
                        
                        ${sale.discount > 0 ? `
                        <div class="receipt-detail-row" style="color:var(--danger);">
                            <span>Discount (${sale.discount}%):</span>
                            <span>- Rs. ${discValue.toLocaleString()}</span>
                        </div>
                        ` : ''}

                        ${sale.loyaltyDiscount > 0 ? `
                        <div class="receipt-detail-row" style="color:var(--warning); font-weight:600;">
                            <span>Loyalty Points Redeemed:</span>
                            <span>- Rs. ${sale.loyaltyDiscount.toLocaleString()}</span>
                        </div>
                        ` : ''}

                        ${sale.delivery > 0 ? `
                        <div class="receipt-detail-row">
                            <span>Delivery Charge:</span>
                            <span>+ Rs. ${sale.delivery.toLocaleString()}</span>
                        </div>
                        ` : ''}

                        <div class="receipt-detail-row" style="font-weight:800; font-size:22px; color:var(--primary); margin-top:10px; border-top: 1px dashed var(--border); padding-top:10px;">
                            <span>NET TOTAL:</span>
                            <span>Rs. ${sale.total.toLocaleString()}</span>
                        </div>
                        
                        <div style="margin-top:15px; padding:10px; background:var(--success-glow); border-radius:8px; border-left:4px solid var(--success);">
                            <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Business Performance</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
                                <span style="font-weight:600; color:var(--success);">Net Profit from Bill:</span>
                                <span style="font-weight:800; color:var(--success); font-size:16px;">Rs. ${profit.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('saleDetailModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>

</html>
